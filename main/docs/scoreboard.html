<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="cleanup.js" defer></script>
  <script src="theme.js" defer></script>
  <script src="nav.js" defer></script>
  <meta name="theme-color" content="#184635" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
  <title>Scoreboard</title>
  <style>
    .mobile-header-link-secondary {
      right: 134px;
    }
  </style>
</head>

<body class="scoreboard-page" style="display: none;">
  <header>
    <div class="nav">
      <div class="brand"><span class="dot"></span> <span data-brand-title>Golf Tournament</span></div>
      <a href="./enter.html" data-enter-link class="mobile-header-link mobile-header-link-primary">Enter Score</a>
      <a href="./hole-map.html" class="mobile-header-link mobile-header-link-secondary">Map</a>
      <button type="button" class="menu-toggle" data-menu-toggle aria-label="Toggle menu"
        aria-expanded="false">☰</button>
      <div class="actions">
        <a href="./index.html">Home</a>
        <a href="./enter.html">Enter Scores</a>
        <a href="./scoreboard.html" data-scoreboard-link>Scoreboard</a>
        <a href="./hole-map.html">Hole Map</a>
        <button type="button" class="theme-toggle" data-theme-toggle></button>
      </div>
    </div>
  </header>
  <div class="container">

    <div class="card">
      <h1 style="margin:0;">Scoreboard</h1>
    </div>

    <a href="./enter.html" data-enter-link class="main-action-link">Enter Scores</a>

    <div class="card">
      <div class="row" style="align-items:flex-end;">
        <div class="col">
          <label for="round_filter">View</label>
          <select id="round_filter"></select>
        </div>
        <div class="col">
          <label>Leaderboard</label>
          <div class="toggle" id="lb_toggle">
            <button id="btn_team">Team</button>
            <button id="btn_player" class="active">Individual</button>
          </div>
          <div class="small" id="toggle_note"></div>
        </div>
        <div class="col" style="min-width:220px;">
          <div class="pill" id="updated">—</div>
          <div class="small" id="status" style="margin-top:6px;"></div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col card">
        <h2 style="margin-top:0;" id="lb_title">Individuals</h2>
        <div class="small" id="lb_title_help" style="margin-top:-6px; margin-bottom:10px;">Click on team/group/player to
          see scores.</div>
        <table class="table" id="lb_tbl">
          <thead>
            <tr id="lb_head"></tr>
          </thead>
          <tbody></tbody>
        </table>
        <hr />
        <div id="stats_panel">
          <h3 style="margin-top:0;">Stats</h3>
          <div class="small" id="stats_meta">—</div>
          <div class="stats-kpis" id="stats_kpis"></div>
          <div class="scoregrid stats-grid" id="stats_grid">
            <table class="table stats-hole-table" id="stats_hole_tbl"></table>
          </div>
        </div>
      </div>
    </div>

    <div class="card" id="scorecard_card" style="display:none;">
      <h2 style="margin-top:0;" id="sc_title">Scorecard</h2>
      <div class="small" id="sc_sub"></div>
      <div class="scoregrid" style="margin-top:12px;" id="sc_grid"></div>
    </div>

    <div class="card">
      <h3 style="margin-top:0;">Debug (raw JSON)</h3>
      <pre id="raw" style="white-space:pre-wrap;"></pre>
    </div>

    <div id="score_notifier" class="score-notifier" role="status" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="scoreboard.js"></script>

  </div>
</body>

</html>
