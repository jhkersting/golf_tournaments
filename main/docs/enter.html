<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="theme.js" defer></script>
  <script src="nav.js" defer></script>
  <script src="pwa.js" defer></script>
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#184635" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Golf Tournament" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="styles.css" />
  <title>Enter Scores</title>
</head>
<body class="enter-page">
<header>
  <div class="nav">
    <div class="brand"><span class="dot"></span> <span data-brand-title>Golf Tournament</span></div>
    <button type="button" class="menu-toggle" data-menu-toggle aria-label="Toggle menu" aria-expanded="false">☰</button>
    <div class="actions">
      <a href="./index.html">Home</a>
      <a href="./enter.html">Enter Scores</a>
      <a href="./scoreboard.html" data-scoreboard-link>Scoreboard</a>
      <a href="./hole-map.html">Hole Map</a>
      <button type="button" class="theme-toggle" data-theme-toggle></button>
    </div>
  </div>
</header>
<div class="container">
  
<div class="card">
  <h1 style="margin:0 0 6px 0;">Enter Scores</h1>
  <div class="small">
    Open with your code: <code>enter.html?code=XXXX</code>. Inputs default to <b>4</b>.<br/>
    If handicaps are enabled for a player-based round, you’ll see per-hole strokes and net totals.
  </div>
</div>

<div class="card" id="who" style="display:none;"></div>
<div id="round_forms"></div>
<div id="score_notifier" class="score-notifier" role="status" aria-live="polite" aria-atomic="true"></div>

<script type="module" src="enter.js"></script>

</div>
<div class="enter-ticker" id="enter_ticker" style="display:none;">
  <div class="enter-ticker-inner">
    <div class="enter-ticker-title" id="enter_ticker_title"></div>
    <div class="enter-ticker-viewport">
      <div class="enter-ticker-track" id="enter_ticker_track"></div>
    </div>
  </div>
</div>
</body>
</html>
