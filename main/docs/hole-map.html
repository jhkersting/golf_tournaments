<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="cleanup.js" defer></script>
  <script src="theme.js" defer></script>
  <script src="nav.js" defer></script>
  <script type="module" src="pwa.js"></script>
  <meta name="theme-color" content="#184635" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Golf Tournament" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
  <title>Map + Enter Scores</title>

  <style>
    .mobile-header-link-secondary{
              right: 105px;
    }
  </style>
</head>

<body class="hole-map-page" >
  <header>
    <div class="nav">
      <div class="brand"><span class="dot"></span> <span data-brand-title>Golf Tournament</span></div>
      <a href="./scoreboard.html" class="mobile-header-link mobile-header-link-primary"
        data-scoreboard-link>Scores</a>
      <button type="button" class="menu-toggle" data-menu-toggle aria-label="Toggle menu"
        aria-expanded="false">☰</button>
      <div class="actions">
        <a href="./index.html">Home</a>
        <a href="./enter.html">Enter Scores</a>
        <a href="./scoreboard.html" data-scoreboard-link>Scoreboard</a>
        <a href="./hole-map.html">Hole Map</a>
        <button type="button" class="theme-toggle" data-theme-toggle></button>
      </div>
    </div>
  </header>

  <div class="container">
    <!--<div class="card">
      <h1 style="margin:0 0 8px 0;">Map + Enter Scores</h1>
      <div class="small">
        Uses your player code and tournament setup to open the current round/hole, then chooses full or simplified map
        data for that round's course.
      </div>
    </div>-->

    <div class="card hole-map-controls">
      <div class="hole-map-nav">
        <button id="hole_prev" class="secondary" type="button">—</button>
            <select id="hole_select" aria-label="Current hole"></select>
            <button id="hole_next" class="secondary" type="button">—</button>
      </div>

      <div id="metric_summary" hidden>Hole — | Par — | —</div>
      <div class="hole-map-summary" aria-live="polite">
        <div class="hole-map-footer-point-head" id="metric_to_point_head">
          <span>To Point</span>
        </div>
        <div class="hole-map-footer-point-value" id="metric_to_point_row">
          <span id="metric_to_point">—</span>
        </div>
        <div class="hole-map-footer-head">
          <span>front</span>
          <span>center</span>
          <span>back</span>
        </div>
        <div class="hole-map-footer-values">
          <span id="metric_front">—</span>
          <span id="metric_center">—</span>
          <span id="metric_back">—</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="hole-map-stage-wrap">
        <canvas id="hole_canvas" class="hole-map-stage" width="1200" height="760" role="img"
          aria-label="Hole layout"></canvas>
        <div class="small hole-map-empty" id="hole_empty" style="display:none;">No geometry found for this hole.</div>
        <div class="hole-map-location">
          <div class="hole-map-location-actions">
            <button id="loc_btn" type="button">Use My Location</button>
            <button id="loc_clear" class="secondary" type="button">Clear Location</button>
            <button id="zoom_auto_toggle" class="secondary hole-map-zoom-toggle" type="button">Auto Zoom: On</button>
          </div>
        </div>
      </div>
    </div>

    <div id="map_ticker_home" class="map-ticker-home">
      <div id="map_ticker_shell" class="map-ticker-shell">
        <div class="enter-ticker" id="enter_ticker" style="display:none;">
          <div class="enter-ticker-inner">
            <div class="enter-ticker-title" id="enter_ticker_title"></div>
            <div class="enter-ticker-viewport">
              <div class="enter-ticker-track" id="enter_ticker_track"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="page-bottom-actions" id="map_page_bottom_actions" hidden>
      <button id="map_change_code_page_btn" class="secondary" type="button">Change code</button>
    </div>
  </div>

  <div id="score_notifier" class="score-notifier" role="status" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="map.js"></script>
</body>

</html>
